<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hermes Agent</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <!-- 依赖 -->
    <!-- Markdown 解析 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
    <!-- 代码高亮 -->
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
    <!-- 中文字体 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&display=swap">
    
    <!-- 样式 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-left">
            <img src="favicon.svg" alt="Logo" class="nav-logo" width="24" height="24">
            <h1 class="nav-title">Hermes Agent</h1>
        </div>
        <div class="nav-right">
            <div id="statusIndicator" class="status-dot" title="未连接"></div>
            <button class="icon-btn" id="clearBtn" title="清空对话">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            </button>
            <button class="icon-btn" id="settingsBtn" title="设置">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
    </nav>

    <!-- 消息区域 -->
    <main class="messages-container" id="messagesContainer">
        <!-- 欢迎屏幕 (无消息时显示) -->
        <div class="welcome-screen" id="welcomeScreen">
            <img src="favicon.svg" alt="Hermes Agent" class="welcome-logo">
            <h2>与 Hermes Agent 对话</h2>
            <p class="welcome-hint">
                点击右上角 ⚙️ 设置 API 地址后开始<br>
                <span class="welcome-sub">地址从服务器获取，密钥已预填</span>
            </p>
            <div class="quick-connect">
                <input type="text" placeholder="粘贴 API 地址 https://xxxx.trycloudflare.com" id="quick-api-input">
                <button id="quickConnectBtn">连接</button>
            </div>
        </div>
    </main>

    <!-- 输入区域 -->
    <footer class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="输入消息..." rows="1" aria-label="聊天输入框"></textarea>
            <button id="sendBtn" class="send-btn" disabled aria-label="发送">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
        <div class="footer-note">Hermes Agent · 内容由 AI 生成</div>
    </footer>

    <!-- 设置抽屉与遮罩层 -->
    <div class="settings-overlay" id="settingsOverlay"></div>
    <aside class="settings-drawer" id="settingsDrawer">
        <div class="drawer-header">
            <h2>设置</h2>
            <button class="icon-btn" id="closeSettingsBtn" title="关闭设置">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        
        <div class="setting-group">
            <h3>连接</h3>
            <div class="setting-item">
                <label class="setting-label" for="apiUrl">API 地址</label>
                <input type="text" id="apiUrl" class="setting-input" placeholder="例如: http://localhost:8642" autocomplete="off">
                <p class="api-url-hint">地址格式: https://xxxx.trycloudflare.com（每次重启会变，从服务器获取）</p>
            </div>
            <div class="setting-item">
                <label class="setting-label" for="apiKey">API 密钥</label>
                <div class="password-wrapper">
                    <input type="password" id="apiKey" class="setting-input" placeholder="输入您的 API Key" autocomplete="off">
                    <button class="toggle-password-btn" id="togglePasswordBtn" title="显示/隐藏密钥">👁</button>
                </div>
            </div>
            <div class="setting-actions">
                <button class="test-btn" id="testConnBtn">🔗 测试连接</button>
                <span id="testConnStatus" class="test-status"></span>
            </div>
        </div>
        
        <div class="setting-group">
            <h3>对话</h3>
            <div class="setting-item">
                <label class="setting-label" for="systemPrompt">System Prompt</label>
                <textarea id="systemPrompt" class="setting-input system-prompt-input" rows="4">你是 Hermes Agent，一个强大的 AI 助手。请用中文回答。</textarea>
            </div>
        </div>
        
        <div class="drawer-footer">
            <button class="save-btn" id="saveSettingsBtn">保存设置</button>
        </div>
    </aside>

    <script src="app.js"></script>
</body>
</html>
